<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 70% 20%, #021c2c, #000814);
            color: #d9e8ff;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron';
            font-size: 3rem;
            color: #5fd3ff;
            margin-bottom: 20px;
        }

        .tagline {
            font-size: 1rem;
            color: #9bdfff;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .card {
            padding: 30px;
            border-radius: 18px;
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 200, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.1);
        }

        .info {
            margin: 15px 0;
            font-size: 1.1rem;
        }

        .label {
            color: #5fd3ff;
            font-weight: 600;
        }

        a {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: #5fd3ff;
        }

        a:hover {
            color: #ffffff;
        }

        .linkedin-btn {
            margin-top: 10px;
            padding: 10px 18px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0077b5, #00c6ff);
            color: black;
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
        }

        .linkedin-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
            background: linear-gradient(135deg, #005582, #00aaff);
        }

        .contact-btn {
            margin-top: 10px;
            padding: 10px 18px;
            border-radius: 10px;
            background: linear-gradient(135deg, #00ffd5, #008cff);
            color: black;
            font-weight: 500;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 200, 0.4);
        }

        .contact-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.8);
            background: linear-gradient(135deg, #00c9a7, #006eff);
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Contact</h1>

        <p class="tagline">
            Let's build something cool together, just message to say hello!
        </p>

        <div class="card">

            <p class="info">
                <span class="label">Email:</span><br>
                <a href="mailto:check.praptisinghal@gmail.com" class="contact-btn">
                    check.praptisinghal@gmail.com
                </a>
            </p>

            <p class="info">
                <span class="label">Phone:</span><br>
                <a href="tel:+919319113336" class="contact-btn">
                    +91 9319 113336
                </a>
            </p>

            <p class="info">
                <span class="label">LinkedIn Profile</span><br>
                <a href="https://www.linkedin.com/in/praptisinghal/" target="_blank" class="linkedin-btn">
                    Connect with me
                </a>
            </p>

        </div>

        <a href="index.html">← Back</a>

    </div>

</body>

</html>
